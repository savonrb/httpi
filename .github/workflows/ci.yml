name: CI

on:
  - push
  - pull_request

permissions:
  contents: read # checkout only, nothing else

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install libcurl
        # curb (in the Gemfile) builds a native extension against libcurl, so
        # bundler-cache's bundle install needs the dev headers.
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Audit dependencies
        run: bundle exec bundle-audit check --update
      - name: Audit Ruby runtime
        # CVE-2026-41316 is an ERB flaw fixed in Ruby 4.0.3 and not yet backported.
        # Ignored on affected rubies only. See:
        # https://www.ruby-lang.org/en/news/2026/04/21/erb-cve-2026-41316/
        # https://github.com/advisories/GHSA-q339-8rmv-2mhv
        run: |
          ignore=""
          if ruby -e 'exit 1 unless Gem::Version.new(RUBY_VERSION) < Gem::Version.new("4.0.3")'; then
            ignore="--ignore CVE-2026-41316"
          fi
          bundle exec ruby-audit check $ignore

  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Audit workflows
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          advanced-security: false # fail the build on findings instead of uploading SARIF

  lint:
    runs-on: ubuntu-latest
    # standardrb --fix is deferred. The suite has known offenses,
    # so this job is advisory until they are cleared.
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install libcurl
        # curb (in the Gemfile) builds a native extension against libcurl, so
        # bundler-cache's bundle install needs the dev headers.
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Standard
        run: bundle exec standardrb

  test:
    name: "Ruby ${{ matrix.ruby }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.0', 3.1, 3.2, 3.3, 3.4, truffleruby, jruby, head, truffleruby-head, jruby-head]
    # Head and alternative-runtime builds surface upstream regressions early and
    # should not block. curb (libcurl bindings) is MRI-only, so its integration
    # specs are skipped automatically on truffleruby/jruby.
    continue-on-error: ${{ matrix.ruby == 'truffleruby' || matrix.ruby == 'jruby' || matrix.ruby == 'head' || matrix.ruby == 'truffleruby-head' || matrix.ruby == 'jruby-head' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install libcurl
        # curb's integration specs need the libcurl development headers.
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true # bundle installs and caches dependencies
      - name: Run tests
        run: bundle exec rake ci --trace
      - name: Upload coverage to Coveralls
        if: matrix.ruby == '3.4'
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          file: coverage/.resultset.json
          format: simplecov
